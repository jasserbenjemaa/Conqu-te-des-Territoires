<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="./styles.css" />
        <title>js game</title>
    </head>
    <body>
        <div class="imgs-container imgs-container-blue">
            <div class="img-wrap">
                <img src="assets/Human Avatars/BL.png" />
            </div>
            <div class="img-wrap">
                <img src="assets/Human Avatars/BM.png" />
            </div>
            <div class="img-wrap">
                <img src="assets/Human Avatars/BW.png" />
            </div>
            <div class="img-wrap">
                <img src="assets/Human Avatars/lancer_stats.png" />
            </div>
            <div class="img-wrap">
                <img src="assets/Human Avatars/monk_stats.png" />
            </div>
            <div class="img-wrap">
                <img src="assets/Human Avatars/worrior_stats.png" />
            </div>
            <div class="btn-wrap">
                <div class="img-wrap" id="check-btn">
                    <img src="assets/check_btn.png" />
                </div>
                <div class="img-wrap" id="cross-btn">
                    <img src="assets/cross_btn.png" />
                </div>
            </div>
        </div>
        <div class="banner" id="banner">
            <img src="assets/banner.png" alt="Conquête des Territoires" />
        </div>
        <div class="play-btn" id="playBtn">
            <img src="assets/playBtn.png" alt="play button" />
        </div>
        <div id="gameboard"></div>

        <script src="index.js"></script>
    </body>
</html>
